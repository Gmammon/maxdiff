<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MaxDiff 问卷平台</title>
<style>
:root{--primary:#4a90d9;--primary-hover:#3a7bc8;--best:#4caf50;--worst:#e53935;--bg:#f5f7fa;--card:#fff;--shadow:0 2px 8px rgba(0,0,0,.08);--border:#e0e4ea;--radius:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;background:var(--bg);color:#333;min-height:100vh}
.container{max-width:820px;margin:0 auto;padding:20px 16px 40px}
.nav{display:flex;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:20px;overflow:hidden}
.nav-btn{flex:1;padding:12px 0;border:none;background:0 0;font-size:14px;font-weight:500;cursor:pointer;color:#666;transition:.15s;border-bottom:3px solid transparent}
.nav-btn:hover{background:#f8f9fb}.nav-btn.active{color:var(--primary);border-bottom-color:var(--primary);background:#f0f5ff}
.card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:16px}
.card h2{font-size:1.1em;margin-bottom:12px}.card h3{font-size:.95em;margin-bottom:8px;color:#666}
.hidden{display:none!important}
.btn{display:inline-flex;align-items:center;padding:9px 20px;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;transition:.15s}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-hover)}.btn-primary:disabled{background:#b0c4de;cursor:not-allowed}
.btn-secondary{background:#e8ecf1;color:#555}.btn-secondary:hover{background:#d8dde5}.btn-sm{padding:6px 14px;font-size:13px}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
textarea,input[type=text],input[type=number]{border:1px solid #ddd;border-radius:8px;padding:10px 12px;font-size:14px;font-family:inherit;width:100%;transition:.15s}
textarea:focus,input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(74,144,217,.12)}
textarea{min-height:140px;resize:vertical;line-height:1.6}
label{font-size:14px;color:#555;display:block;margin-bottom:4px}
.field{margin-bottom:14px}.field-inline{display:flex;gap:12px;align-items:end;flex-wrap:wrap}.field-inline .field{margin-bottom:0}
.field-inline input[type=number]{width:70px;text-align:center}.hint{font-size:12px;color:#999;margin-top:4px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-top:12px}
.stat-box{background:#f8f9fb;border-radius:8px;padding:10px}.stat-box .label{font-size:11px;color:#888;margin-bottom:2px}.stat-box .value{font-size:15px;font-weight:700}
#designPreview{overflow-x:auto}
#designPreview table{width:100%;border-collapse:collapse;font-size:13px}
#designPreview th,#designPreview td{padding:6px 10px;border:1px solid #eee;text-align:center}
#designPreview th{background:#f8f9fb;font-weight:600}
.survey-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.round-info{font-size:14px;color:#666}
.progress-bar{height:6px;background:var(--border);border-radius:3px;margin-bottom:16px;overflow:hidden}
.progress-fill{height:100%;background:var(--primary);border-radius:3px;transition:width .3s}
.instruction{text-align:center;margin-bottom:16px;font-size:14px;color:#555}.instruction strong{color:#333}
.col-labels{display:flex;justify-content:space-between;padding:0 16px;margin-bottom:6px;font-size:12px;font-weight:600}
.col-labels .best-label{color:var(--best)}.col-labels .worst-label{color:var(--worst)}
.item-card{background:var(--card);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.05);transition:.15s}
.item-card.sel-best{background:#e8f5e9;box-shadow:0 0 0 2px var(--best)}.item-card.sel-worst{background:#fce4ec;box-shadow:0 0 0 2px var(--worst)}
.item-name{flex:1;font-size:15px;text-align:center;font-weight:500}
.radio{width:30px;height:30px;border-radius:50%;border:2px solid #ccc;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0;font-size:15px;user-select:none}
.radio:hover{border-color:#999}.radio.best{border-color:var(--best)}.radio.best.on{background:var(--best);color:#fff;border-color:var(--best)}
.radio.worst{border-color:var(--worst)}.radio.worst.on{background:var(--worst);color:#fff;border-color:var(--worst)}
.survey-actions{display:flex;justify-content:space-between;margin-top:16px;gap:12px}
.result-row{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid #f0f0f0}.result-row:last-child{border-bottom:none}
.result-rank{width:32px;height:32px;border-radius:50%;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;margin-right:12px;flex-shrink:0}
.rank-1{background:#ffd700;color:#fff}.rank-2{background:#c0c0c0;color:#fff}.rank-3{background:#cd7f32;color:#fff}
.results-table{width:100%;border-collapse:collapse;font-size:14px;margin-top:12px}
.results-table th,.results-table td{padding:8px 12px;border-bottom:1px solid #f0f0f0;text-align:left}
.results-table th{font-weight:600;color:#666;font-size:12px;text-transform:uppercase}
.results-table tr:hover td{background:#fafbfd}
.bar-chart{margin-top:16px}.bar-row{display:flex;align-items:center;margin-bottom:6px}
.bar-label{width:120px;font-size:13px;text-align:right;padding-right:10px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:24px;background:#f0f0f0;border-radius:4px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:4px;transition:width .5s;min-width:2px}
.bar-value{position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:11px;font-weight:600;color:#555}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-top:12px}
.metric-box{background:#f8f9fb;border-radius:8px;padding:10px;text-align:center}
.metric-box .m-label{font-size:11px;color:#888;margin-bottom:2px}.metric-box .m-value{font-size:15px;font-weight:700}
.loading{text-align:center;color:#888;padding:40px}.error{color:var(--worst);padding:10px;background:#fce4ec;border-radius:8px;margin:10px 0}
select{border:1px solid #ddd;border-radius:8px;padding:8px 12px;font-size:14px;font-family:inherit}
</style>
</head>
<body>
<div class="container">
  <div class="nav">
    <button class="nav-btn active" data-page="designPage">设计</button>
    <button class="nav-btn" data-page="surveyPage">问卷</button>
    <button class="nav-btn" data-page="analysisPage">分析</button>
  </div>

  <!-- 设计页 -->
  <div id="designPage">
    <div class="card">
      <h2>创建项目</h2>
      <div class="field"><label>项目名称</label><input type="text" id="projName" value="我的 MaxDiff 项目"></div>
      <div class="field">
        <label>选项列表</label>
        <textarea id="itemsInput" placeholder="每行一个选项&#10;支持 "属性：水平1 / 水平2" 格式"></textarea>
        <p class="hint">推荐 8~15 个选项</p>
      </div>
      <div class="field-inline">
        <div class="field"><label>每轮展示数</label><input type="number" id="setSize" value="4" min="3" max="8"></div>
        <div class="field"><label>每个选项出现次数</label><input type="number" id="appearances" value="4" min="2" max="10"></div>
        <div class="field"><label>随机种子</label><input type="number" id="designSeed" placeholder="留空随机"><p class="hint">相同种子=相同设计</p></div>
      </div>
      <div class="field">
        <label style="display:inline-flex;align-items:center;gap:6px;cursor:pointer">
          <input type="checkbox" id="addDuplicate" checked> 插入重复任务（一致性检查）
        </label>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" id="createBtn" onclick="createProject()">生成设计</button>
        <button class="btn btn-secondary btn-sm" onclick="loadExample()">加载示例</button>
      </div>
    </div>
    <div id="designResult" class="hidden">
      <div class="card"><h2>设计统计</h2><div class="stats-grid" id="statsGrid"></div></div>
      <div class="card"><h2>设计预览</h2><div id="designPreview"></div>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="startSurvey()">开始问卷</button>
          <button class="btn btn-secondary btn-sm" onclick="showProjects()">查看已有项目</button>
        </div>
      </div>
    </div>
    <div id="projectList" class="hidden">
      <div class="card"><h2>已有项目</h2><div id="projectListContent"></div></div>
    </div>
  </div>

  <!-- 问卷页 -->
  <div id="surveyPage" class="hidden">
    <div class="card" id="surveyCard">
      <div class="survey-header">
        <span class="round-info">第 <span id="roundNum">1</span> 轮 / 共 <span id="totalRounds">?</span> 轮</span>
        <button class="btn btn-secondary btn-sm" onclick="undoTask()" id="undoBtn" disabled>撤销</button>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <p class="instruction">请选出<br><strong style="color:var(--best)">最重要</strong> 和 <strong style="color:var(--worst)">最不重要</strong> 的各一项</p>
      <div class="col-labels"><span class="best-label">最重要</span><span class="worst-label">最不重要</span></div>
      <div id="surveyItems"></div>
      <div class="survey-actions">
        <button class="btn btn-secondary" onclick="showPage('designPage')">返回</button>
        <button class="btn btn-primary" id="nextBtn" onclick="submitTask()" disabled>确认，下一轮</button>
      </div>
    </div>
    <div id="surveyDone" class="hidden">
      <div class="card"><h2>问卷完成！</h2><div id="rankingList"></div>
        <div class="btn-row">
          <button class="btn btn-primary btn-sm" onclick="showPage('analysisPage')">查看分析</button>
          <button class="btn btn-secondary btn-sm" onclick="startNewRespondent()">下一位受访者</button>
        </div>
      </div>
    </div>
    <div id="surveyLogin" class="hidden">
      <div class="card">
        <h2>选择项目</h2>
        <div class="field"><label>选择一个已有项目进行问卷</label><select id="surveyProjectSelect"></select></div>
        <div class="btn-row"><button class="btn btn-primary" onclick="initSurveyFromSelect()">开始问卷</button></div>
      </div>
    </div>
  </div>

  <!-- 分析页 -->
  <div id="analysisPage" class="hidden">
    <div class="card">
      <h2>选择项目</h2>
      <div class="field"><select id="analysisProjectSelect"></select></div>
      <div class="field">
        <label style="display:inline-flex;align-items:center;gap:6px;cursor:pointer">
          <input type="checkbox" id="filterConsistent"> 仅保留一致性 >= 80% 的受访者
        </label>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="runAnalysis()">运行分析</button>
        <button class="btn btn-secondary btn-sm" onclick="runCountModel()">计数模型</button>
        <button class="btn btn-secondary btn-sm" onclick="exportCSV()">导出 CSV</button>
      </div>
    </div>
    <div id="analysisResult" class="hidden">
      <div class="card"><h2>模型拟合</h2><div class="metric-grid" id="metricsGrid"></div></div>
      <div class="card"><h2>属性重要性</h2><div class="bar-chart" id="attrImportanceChart"></div></div>
      <div id="attrLevelsContainer"></div>
      <div class="card"><h2>完整排名</h2><table class="results-table" id="resultsTable"></table></div>
    </div>
    <div id="countResult" class="hidden">
      <div class="card"><h2>计数模型（对照）</h2><table class="results-table" id="countTable"></table>
        <div class="bar-chart" id="countChart"></div>
      </div>
    </div>
    <div id="respList" class="hidden">
      <div class="card"><h2>受访者列表</h2><table class="results-table" id="respTable"></table></div>
    </div>
  </div>
</div>

<script>
// ============================================================
// 状态
// ============================================================
let currentProjectId = null;
let currentDesignId = null;
let currentRespondentId = null;
let surveyState = {}; // {task_number, items, total_tasks, selectedBest, selectedWorst}

// ============================================================
// 工具
// ============================================================
function parseItems(text) {
  return [...new Set(text.split('\n').map(l=>l.trim()).filter(Boolean).flatMap(line=>{
    if(line.includes('：')&&line.includes('/')){const[i,...r]=line.split('：');return r.join('：').split('/').map(l=>i.trim()+'：'+l.trim()).filter(Boolean)}
    if(line.includes(':')&&line.includes('/')){const[i,...r]=line.split(':');return r.join(':').split('/').map(l=>i.trim()+':'+l.trim()).filter(Boolean)}
    return [line]
  }))];
}
function loadExample(){document.getElementById('itemsInput').value='价格：便宜 / 适中 / 昂贵\n续航：短 / 中 / 长\n屏幕：普通 / 高清 / 超清\n拍照：一般 / 良好 / 优秀\n重量：重 / 适中 / 轻薄\n品牌：小众 / 知名 / 顶级'}
async function api(path, method='GET', body=null) {
  const opts = {method, headers:{'Content-Type':'application/json'}};
  if(body) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  if(!res.ok) { const err = await res.json().catch(()=>({detail:res.statusText})); throw new Error(err.detail || '请求失败'); }
  return res.json();
}
function showPage(id) {
  ['designPage','surveyPage','analysisPage'].forEach(p=>document.getElementById(p).classList.toggle('hidden',p!==id));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.page===id));
  if(id==='surveyPage' && !currentRespondentId) showSurveyLogin();
  if(id==='analysisPage') loadProjectSelect('analysisProjectSelect');
}
document.querySelectorAll('.nav-btn').forEach(b=>b.addEventListener('click',()=>showPage(b.dataset.page)));

// ============================================================
// 设计页
// ============================================================
async function createProject() {
  const items = parseItems(document.getElementById('itemsInput').value);
  if(items.length<3){alert('至少 3 个选项');return}
  const setSize = parseInt(document.getElementById('setSize').value)||4;
  if(setSize>=items.length){alert('每轮展示数应小于选项总数');return}
  const seedVal = document.getElementById('designSeed').value.trim();
  const btn = document.getElementById('createBtn');
  btn.disabled=true; btn.textContent='生成中...';
  try {
    const data = await api('/api/projects','POST',{
      name: document.getElementById('projName').value||'未命名',
      items, set_size:setSize,
      appearances: parseInt(document.getElementById('appearances').value)||4,
      seed: seedVal ? parseInt(seedVal) : null,
      add_duplicate: document.getElementById('addDuplicate').checked
    });
    currentProjectId = data.project_id;
    currentDesignId = data.design_id;
    renderDesign(data);
  } catch(e) { alert('生成失败: '+e.message); }
  btn.disabled=false; btn.textContent='生成设计';
}

function renderDesign(data) {
  const m = data.metrics;
  const grid = document.getElementById('statsGrid');
  const stat = (l,v,good) => `<div class="stat-box"><div class="label">${l}</div><div class="value" ${good===true?'style="color:var(--best)"':good===false?'style="color:var(--worst)"':''}>${v}</div></div>`;
  grid.innerHTML = stat('任务数',m.task_count)+stat('选项数',m.item_count)+
    stat('出现次数',`${m.appearance_min}~${m.appearance_max}`,m.appearance_min===m.appearance_max)+
    stat('配对覆盖',`${m.covered_pairs}/${m.total_pairs}`,m.covered_pairs===m.total_pairs)+
    stat('配对共现',`${m.pair_min}~${m.pair_max}`,m.max_pair_deviation<=1)+
    stat('D-efficiency',m.d_efficiency+'%',m.d_efficiency>=80)+
    stat('BIBD 达标',m.is_bibd?'是':'否',m.is_bibd)+
    stat('方法',data.method);

  const prev = document.getElementById('designPreview');
  const k = Math.max(...data.tasks.map(t=>t.length));
  let html='<table><thead><tr><th>任务</th>';
  for(let j=0;j<k;j++) html+=`<th>选项${j+1}</th>`;
  if(data.duplicate_pairs.length) html+='<th>备注</th>';
  html+='</tr></thead><tbody>';
  data.tasks.forEach((task,i)=>{
    const isDupe=data.duplicate_pairs.some(d=>d.duplicate===i);
    const orig=data.duplicate_pairs.find(d=>d.duplicate===i);
    html+=`<tr style="${isDupe?'background:#fff8e1':''}"><td>${i+1}</td>`;
    task.forEach(item=>html+=`<td>${item}</td>`);
    if(data.duplicate_pairs.length) html+=`<td style="font-size:12px;color:#e65100">${isDupe?'重复 #'+(orig.original+1):''}</td>`;
    html+='</tr>';
  });
  html+='</tbody></table>';
  prev.innerHTML=html;
  document.getElementById('designResult').classList.remove('hidden');
}

async function showProjects() {
  try {
    const projects = await api('/api/projects');
    const div = document.getElementById('projectListContent');
    if(!projects.length){div.innerHTML='<p>暂无项目</p>';} else {
      div.innerHTML=projects.map(p=>`<div style="padding:8px 0;border-bottom:1px solid #f0f0f0"><strong>${p.name}</strong> (${p.items.length}选项) <button class="btn btn-secondary btn-sm" onclick="loadProject('${p.id}')">查看</button></div>`).join('');
    }
    document.getElementById('projectList').classList.remove('hidden');
  } catch(e) { console.error(e); }
}

async function loadProject(pid) {
  try {
    const data = await api(`/api/projects/${pid}`);
    currentProjectId = pid;
    if(data.design){
      renderDesign({
        project_id: pid,
        design_id: data.design.id,
        tasks: data.design.tasks,
        duplicate_pairs: data.design.duplicate_pairs,
        metrics: data.design.metrics,
        seed: data.design.seed,
        method: '已加载'
      });
    }
  } catch(e) { alert('加载失败: '+e.message); }
}

// ============================================================
// 问卷页
// ============================================================
async function loadProjectSelect(selectId) {
  try {
    const projects = await api('/api/projects');
    const sel = document.getElementById(selectId);
    sel.innerHTML = projects.map(p=>`<option value="${p.id}">${p.name} (${p.items.length}项)</option>`).join('');
  } catch(e) { console.error(e); }
}

function showSurveyLogin() {
  document.getElementById('surveyCard').classList.add('hidden');
  document.getElementById('surveyDone').classList.add('hidden');
  document.getElementById('surveyLogin').classList.remove('hidden');
  loadProjectSelect('surveyProjectSelect');
}

async function initSurveyFromSelect() {
  const pid = document.getElementById('surveyProjectSelect').value;
  if(!pid){alert('请先创建项目');return}
  currentProjectId = pid;
  await startSurvey();
}

function startSurvey() { return startNewRespondent(); }

async function startNewRespondent() {
  if(!currentProjectId){alert('请先在设计页创建项目');return}
  try {
    const data = await api('/api/survey/start','POST',{project_id:currentProjectId});
    currentRespondentId = data.respondent_id;
    surveyState = {task_number:data.task_number, items:data.items, total_tasks:data.total_tasks, selectedBest:null, selectedWorst:null};
    showPage('surveyPage');
    document.getElementById('surveyLogin').classList.add('hidden');
    document.getElementById('surveyDone').classList.add('hidden');
    document.getElementById('surveyCard').classList.remove('hidden');
    renderSurvey();
  } catch(e) { alert('开始失败: '+e.message); }
}

function renderSurvey() {
  const s = surveyState;
  document.getElementById('roundNum').textContent = s.task_number;
  document.getElementById('totalRounds').textContent = s.total_tasks;
  document.getElementById('progressFill').style.width = ((s.task_number-1)/s.total_tasks*100)+'%';
  document.getElementById('undoBtn').disabled = s.task_number <= 1;
  const list = document.getElementById('surveyItems');
  list.innerHTML = '';
  s.items.forEach(item => {
    const card = document.createElement('div');
    card.className = 'item-card';
    if(item===s.selectedBest) card.classList.add('sel-best');
    if(item===s.selectedWorst) card.classList.add('sel-worst');
    const bestBtn = document.createElement('div');
    bestBtn.className = 'radio best'+(item===s.selectedBest?' on':'');
    bestBtn.innerHTML = item===s.selectedBest?'★':'';
    bestBtn.onclick = () => { s.selectedBest=item; if(s.selectedWorst===item) s.selectedWorst=null; renderSurvey(); updateNextBtn(); };
    const name = document.createElement('div');
    name.className = 'item-name'; name.textContent = item;
    const worstBtn = document.createElement('div');
    worstBtn.className = 'radio worst'+(item===s.selectedWorst?' on':'');
    worstBtn.innerHTML = item===s.selectedWorst?'✗':'';
    worstBtn.onclick = () => { s.selectedWorst=item; if(s.selectedBest===item) s.selectedBest=null; renderSurvey(); updateNextBtn(); };
    card.appendChild(bestBtn); card.appendChild(name); card.appendChild(worstBtn);
    list.appendChild(card);
  });
  if(s.items.length===2 && s.selectedBest && !s.selectedWorst) {
    s.selectedWorst = s.items.find(i=>i!==s.selectedBest); renderSurvey();
  }
  updateNextBtn();
}

function updateNextBtn() {
  const s = surveyState;
  document.getElementById('nextBtn').disabled = !(s.selectedBest && s.selectedWorst && s.selectedBest !== s.selectedWorst);
}

async function submitTask() {
  const s = surveyState;
  if(!s.selectedBest || !s.selectedWorst) return;
  try {
    const data = await api(`/api/survey/${currentRespondentId}/submit`,'POST',{
      task_number: s.task_number,
      best_item: s.selectedBest,
      worst_item: s.selectedWorst
    });
    if(data.status==='completed') {
      showSurveyDone(data.ranking);
    } else {
      s.task_number = data.task_number;
      s.items = data.items;
      s.total_tasks = data.total_tasks;
      s.selectedBest = null;
      s.selectedWorst = null;
      renderSurvey();
    }
  } catch(e) { alert('提交失败: '+e.message); }
}

async function undoTask() {
  try {
    const data = await api(`/api/survey/${currentRespondentId}/undo`,'POST');
    surveyState.task_number = data.current_task;
    surveyState.items = data.items;
    surveyState.total_tasks = data.total_tasks;
    surveyState.selectedBest = null;
    surveyState.selectedWorst = null;
    renderSurvey();
  } catch(e) { alert('撤销失败: '+e.message); }
}

function showSurveyDone(ranking) {
  document.getElementById('surveyCard').classList.add('hidden');
  document.getElementById('surveyDone').classList.remove('hidden');
  const list = document.getElementById('rankingList');
  list.innerHTML = '';
  (ranking||[]).forEach((r,i)=>{
    const row = document.createElement('div');
    row.className = 'result-row';
    const rank = document.createElement('div');
    rank.className = 'result-rank'+(i<3?' rank-'+(i+1):'');
    rank.textContent = i+1;
    const name = document.createElement('div');
    name.className = 'result-name';
    name.textContent = r.item + ' (B-W: '+(r.score>0?'+':'')+r.score+')';
    row.appendChild(rank); row.appendChild(name);
    list.appendChild(row);
  });
}

// ============================================================
// 分析页
// ============================================================
async function runAnalysis() {
  const pid = document.getElementById('analysisProjectSelect').value;
  if(!pid){alert('请选择项目');return}
  const filterOn = document.getElementById('filterConsistent').checked;
  const url = `/api/analysis/${pid}` + (filterOn ? '?min_consistency=0.8' : '');
  try {
    const data = await api(url);
    renderAnalysis(data);
    // 也加载受访者列表
    const resps = await api(`/api/analysis/${pid}/respondents`);
    renderRespondents(resps);
  } catch(e) { alert('分析失败: '+e.message); }
}

function renderAnalysis(data) {
  const metrics = document.getElementById('metricsGrid');
  const addM = (l,v,h) => `<div class="metric-box"><div class="m-label">${l}</div><div class="m-value">${v}</div>${h?'<div class="m-label" style="margin-top:2px">'+h+'</div>':''}</div>`;
  let html = addM('作答记录',data.response_count)+addM('受访者',data.respondent_count)+addM('选项数',data.items.length)+
    addM('对数似然',data.log_likelihood.toFixed(2))+addM('RLH',data.rlh.toFixed(4),'基线: '+data.random_rlh.toFixed(4))+
    addM('RLH 倍率',data.rlh_ratio.toFixed(1)+'x',data.rlh_ratio>2?'良好':data.rlh_ratio>1.5?'一般':'较差')+
    addM('迭代',data.iterations)+addM('收敛',data.converged?'是':'否');
  if(data.consistency) html += addM('一致性',`${(data.consistency.mean*100).toFixed(0)}% 均值`,`n=${data.consistency.n_with_score}`);
  metrics.innerHTML = html;

  // 按属性分组
  const attrs = {};
  data.items.forEach(item => {
    const sep = item.includes('：') ? '：' : (item.includes(':') ? ':' : null);
    const attr = sep ? item.split(sep)[0] : '其他';
    const level = sep ? item.split(sep).slice(1).join(sep) : item;
    if (!attrs[attr]) attrs[attr] = [];
    attrs[attr].push({ name: item, level, utility: data.utilities[item], score: data.scores[item], se: data.standard_errors ? data.standard_errors[item] : NaN });
  });

  // 属性重要性（各属性内效用极差）
  const attrData = Object.entries(attrs).map(([attr, levels]) => {
    const utils = levels.map(l => l.utility);
    return { attr, importance: Math.max(...utils) - Math.min(...utils), levels };
  }).sort((a, b) => b.importance - a.importance);

  const maxImp = Math.max(...attrData.map(a => a.importance));
  document.getElementById('attrImportanceChart').innerHTML = attrData.map(({ attr, importance }) => {
    const pct = maxImp > 0 ? (importance / maxImp * 100) : 0;
    return `<div class="bar-row"><div class="bar-label" title="${attr}">${attr}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:var(--primary)"></div><div class="bar-value">${importance.toFixed(2)}</div></div></div>`;
  }).join('');

  // 每个属性的水平效用卡片
  const container = document.getElementById('attrLevelsContainer');
  const colors = ['#4a90d9','#4caf50','#ff9800','#e91e63','#9c27b0','#00bcd4','#795548','#607d8b'];
  container.innerHTML = attrData.map(({ attr, levels }, ci) => {
    const sorted = [...levels].sort((a, b) => b.utility - a.utility);
    const maxU = Math.max(...sorted.map(l => Math.abs(l.utility)));
    const color = colors[ci % colors.length];
    let bars = sorted.map(l => {
      const pct = maxU > 0 ? (Math.abs(l.utility) / maxU * 100) : 0;
      const bg = l.utility >= 0 ? color : '#ccc';
      return `<div class="bar-row"><div class="bar-label">${l.level}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${bg}"></div><div class="bar-value">${l.utility.toFixed(2)}</div></div></div>`;
    }).join('');
    return `<div class="card"><h2>${attr}</h2>${bars}</div>`;
  }).join('');

  // 完整排名表
  const ranked = Object.entries(data.scores).sort((a,b)=>b[1]-a[1]);
  const hasSE = data.standard_errors && !isNaN(data.standard_errors[ranked[0][0]]);
  let th = '<thead><tr><th>排名</th><th>选项</th><th>效用值</th>';
  if(hasSE) th+='<th>标准误</th><th>|z|</th>';
  th+='<th>分数</th></tr></thead><tbody>';
  ranked.forEach(([item,score],i)=>{
    const u=data.utilities[item];
    const se=hasSE?data.standard_errors[item]:NaN;
    const z=hasSE&&se>0?Math.abs(u/se):NaN;
    th+=`<tr><td>${i+1}</td><td>${item}</td><td>${u.toFixed(4)}</td>`;
    if(hasSE) th+=`<td>${isNaN(se)?'-':se.toFixed(4)}</td><td>${isNaN(z)?'-':z.toFixed(2)}${z>2.58?' **':z>1.96?' *':''}</td>`;
    th+=`<td>${score.toFixed(1)}</td></tr>`;
  });
  th+='</tbody>';
  document.getElementById('resultsTable').innerHTML = th;
  document.getElementById('analysisResult').classList.remove('hidden');
}

function renderBarChart(id, items) {
  const div = document.getElementById(id);
  const maxV = Math.max(...items.map(i=>i[1]));
  div.innerHTML = items.map(([name,val])=>{
    const pct = maxV>0?(val/maxV*100):0;
    return `<div class="bar-row"><div class="bar-label" title="${name}">${name}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${pct>50?'var(--primary)':'#90caf9'}"></div><div class="bar-value">${val.toFixed(1)}</div></div></div>`;
  }).join('');
}

async function runCountModel() {
  const pid = document.getElementById('analysisProjectSelect').value;
  if(!pid) return;
  try {
    const data = await api(`/api/analysis/${pid}/count`);
    const ranked = Object.entries(data.scores).sort((a,b)=>b[1]-a[1]);
    let html='<thead><tr><th>排名</th><th>选项</th><th>最佳</th><th>最差</th><th>B-W</th><th>分数</th></tr></thead><tbody>';
    ranked.forEach(([item,score],i)=>{
      html+=`<tr><td>${i+1}</td><td>${item}</td><td>${data.best_count[item]}</td><td>${data.worst_count[item]}</td><td>${data.diff[item]>0?'+':''}${data.diff[item]}</td><td>${score.toFixed(1)}</td></tr>`;
    });
    html+='</tbody>';
    document.getElementById('countTable').innerHTML=html;
    renderBarChart('countChart',ranked);
    document.getElementById('countResult').classList.remove('hidden');
  } catch(e) { alert('计数模型失败: '+e.message); }
}

function renderRespondents(resps) {
  let html='<thead><tr><th>ID</th><th>状态</th><th>进度</th><th>一致性</th><th>时间</th></tr></thead><tbody>';
  resps.forEach(r=>{
    html+=`<tr><td style="font-size:12px">${r.id}</td><td>${r.status==='completed'?'已完成':'进行中'}</td><td>${r.current_task}/${r.total_tasks}</td><td>${r.consistency_score!=null?(r.consistency_score*100).toFixed(0)+'%':'-'}</td><td style="font-size:12px">${r.started_at.substring(11,16)}</td></tr>`;
  });
  html+='</tbody>';
  document.getElementById('respTable').innerHTML=html;
  document.getElementById('respList').classList.remove('hidden');
}

function exportCSV() {
  const pid = document.getElementById('analysisProjectSelect').value;
  if(!pid) return;
  window.open(`/api/analysis/${pid}/export`);
}
